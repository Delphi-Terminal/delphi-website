<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markets – Delphi Markets</title>
  <meta name="description" content="Delphi Markets – prediction market data, benchmarks, and live signals across 9+ exchanges." />
  <link rel="canonical" href="https://delphimarkets.com/markets/" />
  <meta property="og:title" content="Markets – Delphi Markets" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: transparent;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .header.is-scrolled {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.08);
    }

    .header__brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .header__brand-icon {
      height: 64px;
      width: auto;
      mix-blend-mode: multiply;
    }

    .header__nav {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .header__nav a {
      color: #0a1f44;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.2s ease;
    }

    .header__nav a:hover { opacity: 0.7; }

    .header__nav a.is-active {
      background: #0a1f44;
      color: #fff;
    }

    .header__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .header__menu-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      width: 48px;
      height: 48px;
      padding: 12px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 60;
      -webkit-tap-highlight-color: transparent;
      margin-right: -8px;
    }
    .header__menu-btn span {
      display: block;
      width: 22px;
      height: 2px;
      background: #0a1f44;
      border-radius: 1px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .header__menu-btn.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .header__menu-btn.is-open span:nth-child(2) { opacity: 0; }
    .header__menu-btn.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 768px) {
      .header { padding: 0 20px; height: 56px; }
      .header__brand-icon { height: 48px; }
      .header__menu-btn { display: flex; }
      .header nav { position: fixed; }
      .header__nav {
        position: fixed;
        top: 0; right: 0; bottom: 0;
        width: min(320px, 85vw);
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 0;
        padding: 80px 24px 32px;
        background: #fff;
        z-index: 55;
        box-shadow: -4px 0 24px rgba(10, 31, 68, 0.08);
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .header__nav.is-open { transform: translateX(0); }
      .header__nav li { border-bottom: 1px solid rgba(10, 31, 68, 0.08); }
      .header__nav li:last-child { border-bottom: none; }
      .header__nav a { display: block; font-size: 18px; padding: 18px 0; border-radius: 0; }
      .header__nav-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 31, 68, 0.15);
        z-index: 54;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .header__nav-backdrop.is-visible {
        display: block;
        opacity: 1;
        pointer-events: auto;
        inset: auto;
        left: 0;
        top: 0;
        bottom: 0;
        right: min(320px, 85vw);
        width: auto;
        height: auto;
      }
      .page-content { padding: 100px 20px 80px; }
      .site-footer { padding: 48px 24px 0; }
      .footer__top { flex-direction: column; gap: 40px; }
      .footer__columns { gap: 48px; }
    }
    @media (min-width: 769px) {
      .header__nav-backdrop { display: none !important; }
    }

    .page-content {
      padding: 140px 56px 120px;
      min-height: 100vh;
    }

    .page-title {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(36px, 4vw, 64px);
      font-weight: 700;
      color: #0a1f44;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: #0a1f44;
      margin-top: 24px;
      opacity: 0.6;
    }

    /* ── Footer ── */
    .site-footer {
      background: #0a1f44;
      width: 100%;
      padding: 64px 48px 0;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }
    .footer__top {
      display: flex;
      justify-content: space-between;
      gap: 64px;
      padding-bottom: 48px;
    }
    .footer__brand { max-width: 300px; }
    .footer__logo {
      height: 48px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    .footer__tagline {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.6;
      opacity: 0.7;
      letter-spacing: -0.01em;
    }
    .footer__columns { display: flex; gap: 80px; }
    .footer__col { display: flex; flex-direction: column; gap: 12px; }
    .footer__col-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.5;
      margin-bottom: 4px;
    }
    .footer__col a {
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 400;
      opacity: 0.85;
      transition: opacity 0.2s ease;
      letter-spacing: -0.01em;
    }
    .footer__col a:hover { opacity: 1; }
    .footer__bottom {
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding: 24px 0;
    }
    .footer__bottom p {
      font-size: 13px;
      font-weight: 300;
      opacity: 0.4;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header__row">
      <a href="/" class="header__brand">
        <img class="header__brand-icon" src="../logo-Photoroom.png" alt="Delphi" />
      </a>
      <button type="button" class="header__menu-btn" id="menuBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="header__nav-backdrop" id="navBackdrop"></div>
    <nav>
      <ul class="header__nav" id="headerNav">
        <li><a href="/news/">News</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/data/">Data</a></li>
        <li><a href="https://docs.delphimarkets.com/" target="_blank" rel="noopener noreferrer">Docs</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="page-content">
      <p class="page-title">Markets</p>
      <p class="page-subtitle">Coming soon.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer__top">
      <div class="footer__brand">
        <a href="/"><img src="/logo-Photoroom.png" alt="Delphi" class="footer__logo" /></a>
        <p class="footer__tagline">The data infrastructure<br>for the prediction economy.</p>
      </div>
      <div class="footer__columns">
        <div class="footer__col">
          <p class="footer__col-title">Product</p>
          <a href="/data/">Data</a>
          <a href="/news/">Delphi News</a>
          <a href="/markets/">Markets</a>
        </div>
        <div class="footer__col">
          <p class="footer__col-title">Company</p>
          <a href="/about/">About</a>
          <a href="/contact/">Contact</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom">
      <p>&copy; Delphi Markets Inc. 2026</p>
    </div>
  </footer>

  <script>
    (function() {
      var menuBtn = document.getElementById('menuBtn');
      var headerNav = document.getElementById('headerNav');
      var navBackdrop = document.getElementById('navBackdrop');
      function closeMenu() {
        if (menuBtn) menuBtn.classList.remove('is-open');
        if (headerNav) headerNav.classList.remove('is-open');
        if (navBackdrop) navBackdrop.classList.remove('is-visible');
        document.body.style.overflow = '';
      }
      if (menuBtn && headerNav) {
        menuBtn.addEventListener('click', function() {
          if (headerNav.classList.contains('is-open')) closeMenu();
          else {
            menuBtn.classList.add('is-open');
            headerNav.classList.add('is-open');
            if (navBackdrop) navBackdrop.classList.add('is-visible');
            document.body.style.overflow = 'hidden';
          }
        });
        if (navBackdrop) navBackdrop.addEventListener('click', closeMenu);
      }
    })();
  </script>
  <script>
    const header = document.querySelector('.header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('is-scrolled', window.scrollY > 10);
    }, { passive: true });
  </script>
</body>
</html>
