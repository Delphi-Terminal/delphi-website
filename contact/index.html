<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Delphi Markets</title>
  <meta name="description" content="Get in touch with Delphi Markets. Enterprise API requests, support, and partnership inquiries." />
  <link rel="canonical" href="https://delphimarkets.com/contact/" />
  <meta property="og:title" content="Contact – Delphi Markets" />
  <meta property="og:url" content="https://delphimarkets.com/contact/" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: transparent;
    }

    .header__brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .header__brand-icon {
      height: 64px;
      width: auto;
      mix-blend-mode: multiply;
    }

    .header__nav {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .header__nav a {
      color: #0a1f44;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.2s ease;
    }

    .header__nav a:hover { opacity: 0.7; }

    .header__nav a.is-active {
      background: #0a1f44;
      color: #fff;
    }

    .header__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .header__menu-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      width: 48px;
      height: 48px;
      padding: 12px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 60;
      -webkit-tap-highlight-color: transparent;
      margin-right: -8px;
    }
    .header__menu-btn span {
      display: block;
      width: 22px;
      height: 2px;
      background: #0a1f44;
      border-radius: 1px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .header__menu-btn.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .header__menu-btn.is-open span:nth-child(2) { opacity: 0; }
    .header__menu-btn.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 768px) {
      .header { padding: 0 20px; height: 56px; }
      .header__brand-icon { height: 48px; }
      .header__menu-btn { display: flex; }
      .header nav { position: fixed; }
      .header__nav {
        position: fixed;
        top: 0; right: 0; bottom: 0;
        width: min(320px, 85vw);
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 0;
        padding: 80px 24px 32px;
        background: #fff;
        z-index: 55;
        box-shadow: -4px 0 24px rgba(10, 31, 68, 0.08);
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .header__nav.is-open { transform: translateX(0); }
      .header__nav li { border-bottom: 1px solid rgba(10, 31, 68, 0.08); }
      .header__nav li:last-child { border-bottom: none; }
      .header__nav a { display: block; font-size: 18px; padding: 18px 0; border-radius: 0; }
      .header__nav-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 31, 68, 0.15);
        z-index: 54;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .header__nav-backdrop.is-visible {
        display: block;
        opacity: 1;
        pointer-events: auto;
        inset: auto;
        left: 0;
        top: 0;
        bottom: 0;
        right: min(320px, 85vw);
        width: auto;
        height: auto;
      }
      .contact-page {
        flex-direction: column;
        padding: 100px 24px 80px;
        gap: 48px;
      }
      .contact-left { max-width: none; }
      .contact-right { padding-left: 0; }
      .site-footer { padding: 48px 24px 32px !important; }
    }
    @media (min-width: 769px) {
      .header__nav-backdrop { display: none !important; }
    }

    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      padding: 180px 72px 120px;
      gap: 0;
    }

    .contact-left {
      flex: 0 0 28%;
      max-width: 320px;
    }

    .contact-heading {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(48px, 6vw, 80px);
      font-weight: 700;
      color: #0a1f44;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .contact-line {
      width: 100%;
      height: 0.5px;
      background: #0a1f44;
      margin-top: 32px;
    }

    .contact-sub {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 300;
      color: #0a1f44;
      letter-spacing: -0.01em;
      margin-top: 20px;
      opacity: 0.6;
      text-align: center;
    }

    .contact-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 48px;
      padding-top: 20px;
      padding-left: 12%;
    }

    .contact-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .contact-label {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #0a1f44;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .contact-input {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(24px, 2.5vw, 36px);
      font-weight: 300;
      color: #0a1f44;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(10, 31, 68, 0.15);
      padding: 12px 0 16px;
      outline: none;
      transition: border-color 0.2s ease;
      letter-spacing: -0.02em;
      width: 100%;
    }

    .contact-input::placeholder {
      color: rgba(10, 31, 68, 0.25);
    }

    .contact-input:focus {
      border-bottom-color: #0a1f44;
    }

    .contact-textarea {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(24px, 2.5vw, 36px);
      font-weight: 300;
      color: #0a1f44;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(10, 31, 68, 0.15);
      padding: 12px 0 16px;
      outline: none;
      transition: border-color 0.2s ease;
      letter-spacing: -0.02em;
      width: 100%;
      resize: vertical;
      min-height: 100px;
    }

    .contact-textarea::placeholder {
      color: rgba(10, 31, 68, 0.25);
    }

    .contact-textarea:focus {
      border-bottom-color: #0a1f44;
    }

    .contact-submit {
      align-self: center;
      margin-top: 24px;
    }

    .contact-submit button {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #0a1f44;
      background: transparent;
      border: 1.5px solid #0a1f44;
      border-radius: 24px;
      padding: 12px 36px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 0.2s ease;
    }

    .contact-submit button:hover {
      background: #0a1f44;
      color: #fff;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header__row">
      <a href="/" class="header__brand">
        <img class="header__brand-icon" src="../logo-Photoroom.png" alt="Delphi" />
      </a>
      <button type="button" class="header__menu-btn" id="menuBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="header__nav-backdrop" id="navBackdrop"></div>
    <nav>
      <ul class="header__nav" id="headerNav">
        <li><a href="/news/">News</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/data/">Data</a></li>
        <li><a href="/contact/" class="is-active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="contact-page">
      <div class="contact-left">
        <p class="contact-heading">Contact</p>
        <div class="contact-line"></div>
        <p class="contact-sub">Get in touch with Delphi</p>
      </div>

      <form class="contact-right" action="https://formsubmit.co/armon@delphiterminal.co" method="POST">
        <input type="hidden" name="_subject" value="Delphi Contact Form" />
        <input type="hidden" name="_template" value="table" />
        <div class="contact-field">
          <span class="contact-label">Your Email</span>
          <input class="contact-input" type="email" name="email" placeholder="name@email.com" required />
        </div>
        <div class="contact-field">
          <span class="contact-label">Your Message</span>
          <textarea class="contact-textarea" name="message" id="contactMessage" placeholder="How can we help?" required></textarea>
        </div>
        <div class="contact-submit">
          <button type="submit">Send message</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer" style="background:#0a1f44;width:100%;padding:64px 72px 48px">
    <div style="display:flex;flex-direction:column;gap:24px;margin-bottom:80px">
      <a href="/news/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">News</a>
      <a href="/about/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">About</a>
      <a href="/data/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">Data</a>
      <a href="/contact/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">Contact</a>
    </div>
    <p style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:300;color:#fff;opacity:0.5;letter-spacing:-0.01em;text-align:center">© Delphi Markets Inc. 2026</p>
  </footer>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('ref') === 'enterprise') {
        var msgEl = document.getElementById('contactMessage');
        if (msgEl) msgEl.value = 'Enterprise API Request:\n\n';
      }
    })();
    (function() {
      var menuBtn = document.getElementById('menuBtn');
      var headerNav = document.getElementById('headerNav');
      var navBackdrop = document.getElementById('navBackdrop');
      function closeMenu() {
        if (menuBtn) menuBtn.classList.remove('is-open');
        if (headerNav) headerNav.classList.remove('is-open');
        if (navBackdrop) navBackdrop.classList.remove('is-visible');
        document.body.style.overflow = '';
      }
      if (menuBtn && headerNav) {
        menuBtn.addEventListener('click', function() {
          if (headerNav.classList.contains('is-open')) closeMenu();
          else {
            menuBtn.classList.add('is-open');
            headerNav.classList.add('is-open');
            if (navBackdrop) navBackdrop.classList.add('is-visible');
            document.body.style.overflow = 'hidden';
          }
        });
        if (navBackdrop) navBackdrop.addEventListener('click', closeMenu);
      }
    })();
  </script>
</body>
</html>
