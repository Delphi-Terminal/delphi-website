<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Delphi Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%230a1f44'/><text x='50' y='65' font-family='Arial' font-size='40' font-weight='bold' fill='white' text-anchor='middle'>D</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: transparent;
    }

    .header__brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .header__brand-icon {
      height: 64px;
      width: auto;
      mix-blend-mode: multiply;
    }

    .header__nav {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .header__nav a {
      color: #0a1f44;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.2s ease;
    }

    .header__nav a:hover { opacity: 0.7; }

    .header__nav a.is-active {
      background: #0a1f44;
      color: #fff;
    }

    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      padding: 180px 72px 120px;
      gap: 0;
    }

    .contact-left {
      flex: 0 0 28%;
      max-width: 320px;
    }

    .contact-heading {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(48px, 6vw, 80px);
      font-weight: 700;
      color: #0a1f44;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .contact-line {
      width: 100%;
      height: 0.5px;
      background: #0a1f44;
      margin-top: 32px;
    }

    .contact-sub {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 300;
      color: #0a1f44;
      letter-spacing: -0.01em;
      margin-top: 20px;
      opacity: 0.6;
      text-align: center;
    }

    .contact-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 48px;
      padding-top: 20px;
      padding-left: 12%;
    }

    .contact-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .contact-label {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #0a1f44;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .contact-input {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(24px, 2.5vw, 36px);
      font-weight: 300;
      color: #0a1f44;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(10, 31, 68, 0.15);
      padding: 12px 0 16px;
      outline: none;
      transition: border-color 0.2s ease;
      letter-spacing: -0.02em;
      width: 100%;
    }

    .contact-input::placeholder {
      color: rgba(10, 31, 68, 0.25);
    }

    .contact-input:focus {
      border-bottom-color: #0a1f44;
    }

    .contact-textarea {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(24px, 2.5vw, 36px);
      font-weight: 300;
      color: #0a1f44;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(10, 31, 68, 0.15);
      padding: 12px 0 16px;
      outline: none;
      transition: border-color 0.2s ease;
      letter-spacing: -0.02em;
      width: 100%;
      resize: vertical;
      min-height: 100px;
    }

    .contact-textarea::placeholder {
      color: rgba(10, 31, 68, 0.25);
    }

    .contact-textarea:focus {
      border-bottom-color: #0a1f44;
    }

    .contact-submit {
      align-self: center;
      margin-top: 24px;
    }

    .contact-submit button {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #0a1f44;
      background: transparent;
      border: 1.5px solid #0a1f44;
      border-radius: 24px;
      padding: 12px 36px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 0.2s ease;
    }

    .contact-submit button:hover {
      background: #0a1f44;
      color: #fff;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="header__brand">
      <img class="header__brand-icon" src="../logo-Photoroom.png" alt="Delphi" />
    </a>
    <nav>
      <ul class="header__nav">
        <li><a href="/markets/">Markets</a></li>
        <li><a href="/news/">News</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/contact/" class="is-active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="contact-page">
      <div class="contact-left">
        <p class="contact-heading">Contact</p>
        <div class="contact-line"></div>
        <p class="contact-sub">Get in touch with Delphi</p>
      </div>

      <form class="contact-right" onsubmit="return false;">
        <div class="contact-field">
          <span class="contact-label">Your Email</span>
          <input class="contact-input" type="email" placeholder="name@email.com" />
        </div>
        <div class="contact-field">
          <span class="contact-label">Your Message</span>
          <textarea class="contact-textarea" placeholder="How can we help?"></textarea>
        </div>
        <div class="contact-submit">
          <button type="submit">Send message</button>
        </div>
      </form>
    </div>
  </main>

  <footer style="background:#0a1f44;width:100%;padding:64px 72px 48px">
    <div style="display:flex;flex-direction:column;gap:24px;margin-bottom:80px">
      <a href="/markets/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">Markets</a>
      <a href="/news/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">News</a>
      <a href="/about/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">About</a>
      <a href="/contact/" style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:20px;font-weight:400;color:#fff;text-decoration:none;letter-spacing:-0.01em;opacity:0.85">Contact</a>
    </div>
    <p style="font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:300;color:#fff;opacity:0.5;letter-spacing:-0.01em;text-align:center">© Delphi Markets Inc. 2026</p>
  </footer>

</body>
</html>
