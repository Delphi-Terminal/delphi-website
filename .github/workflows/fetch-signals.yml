name: Fetch Market Signals

on:
  schedule:
    # Runs every 6 hours at :00 — 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main   # target branch to commit signals.json back to

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytrends requests

      - name: Run signal fetcher
        run: python scripts/fetch_signals.py

      - name: Commit and push signals.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add signals.json
          git diff --staged --quiet || git commit -m "chore: update market signals [skip ci]"
          git push
