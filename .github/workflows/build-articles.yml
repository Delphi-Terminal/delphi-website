name: Build Articles

on:
  push:
    paths:
      - 'content/articles/**'
      - 'scripts/build_articles.py'
      - 'scripts/templates/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown pyyaml

      - name: Build articles
        run: python scripts/build_articles.py

      - name: Commit and push built articles
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add articles/*.html articles.json
          git diff --staged --quiet || git commit -m "chore: rebuild articles from Markdown [skip ci]"
          git push
