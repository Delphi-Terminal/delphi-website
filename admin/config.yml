# Decap CMS — Delphi News
# https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  repo: Delphi-Terminal/delphi-website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b96294af-21e6-4cce-9278-5846747cba8b/pkce
  auth_token_endpoint: /sites/b96294af-21e6-4cce-9278-5846747cba8b/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

media_folder: "articles/images"
public_folder: "images"

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://delphimarkets.com
display_url: https://delphimarkets.com

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: content/articles
    create: true
    slug: "{{fields.slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} · {{category}}"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: World
        field: category
        pattern: World
      - label: Economy
        field: category
        pattern: Economy
      - label: Tech
        field: category
        pattern: Tech
      - label: Research
        field: category
        pattern: Research
    fields:
      - label: Slug
        name: slug
        widget: string
        hint: "URL-friendly ID, e.g. crude-oil-top-market-mover (used for filename)"
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Use lowercase letters, numbers, and hyphens only"]
      - label: Title
        name: title
        widget: string
      - label: Category
        name: category
        widget: select
        options:
          - World
          - Economy
          - Tech
          - Research
      - label: Author
        name: author
        widget: string
      - label: Date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
      - label: Excerpt
        name: excerpt
        widget: text
        hint: "Short summary for listings and previews"
      - label: Image
        name: image
        widget: image
        required: false
        hint: "Path relative to articles folder, e.g. images/filename.png"
      - label: Image Alt Text
        name: imageAlt
        widget: string
        required: false
        hint: "Accessibility description for the image"
      - label: Image Caption
        name: imageCaption
        widget: string
        required: false
        hint: "Figure caption (can include HTML like <span class=\"article__figure-credit\">Source</span>)"
      - label: Body
        name: body
        widget: markdown
        hint: "Use [[IMAGE]] where you want the hero image to appear (from fields above)"
